</script><style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;text-align:center;}
.container{max-width:420px;margin:auto;padding:15px;}

}

</style></head><body><h1>🔐 Smart Password Generator</h1><div class="container"><input type="text" id="hint" placeholder="Enter hint (name, word etc)"><button onclick="generate()">Generate Secure Password</button>

<div class="output" id="output">Password will appear here</div>
<div class="copy" onclick="copy()">Copy</div><div class="strength" id="strength"></div></div><script>

function generate(){

let hint=document.getElementById("hint").value.trim();

let upper="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let lower="abcdefghijklmnopqrstuvwxyz";
let num="0123456789";
let sym="!@#$%^&*";

let all=upper+lower+num+sym;

let random="";
for(let i=0;i<8;i++){
random+=all[Math.floor(Math.random()*all.length)];
}

// mix hint
let final = "";

if(hint){
hint = hint.charAt(0).toUpperCase() + hint.slice(1);
final = hint + random;
}else{
final = random + random;
}

output.innerText=final;
check(final);
}

function copy(){
navigator.clipboard.writeText(output.innerText);
}

function check(p){
let strength="Weak ❌";

if(p.length>=10 && /[A-Z]/.test(p) && /[0-9]/.test(p)){
strength="Medium ⚠️";
}
if(p.length>=14 && /[A-Z]/.test(p) && /[0-9]/.test(p) && /[!@#$]/.test(p)){
strength="Strong 🔥";
}

strengthEl=document.getElementById("strength");
strengthEl.innerText="Strength: "+strength;
}

</script></body>
