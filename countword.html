</style></head><body><h1>✍️ Word Counter</h1><div class="container"><textarea id="text" placeholder="Type or paste your text..."></textarea><div class="stats" id="stats">
Words: 0<br>
Characters: 0<br>
Sentences: 0<br>
Reading Time: 0 min
</div></div><script>

text.addEventListener("input",count);

function count(){

let t=text.value;

let words=t.trim().split(/\s+/).filter(w=>w.length>0);
let wordCount=words.length;

let charCount=t.length;

let sentenceCount=(t.match(/[.!?]+/g)||[]).length;

let readTime=Math.ceil(wordCount/200); // avg reading speed

stats.innerHTML=`
Words: ${wordCount}<br>
Characters: ${charCount}<br>
Sentences: ${sentenceCount}<br>
Reading Time: ${readTime} min
`;

}

</script></body>
