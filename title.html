</style></head><body><h1>📺 Title Generator</h1><div class="container"><input type="text" id="keyword" placeholder="Enter keyword"><button onclick="start()">Generate Titles</button>

<div id="result"></div><!-- MORE TOOLS --><div class="more"><div onclick="goTag()" class="tool-card">
<div>
<div class="tool-title">🏷️ Hashtag Generator</div>
<div class="tool-sub">Generate viral tags</div>
</div>
<div>→</div>
</div><div onclick="goDesc()" class="tool-card">
<div>
<div class="tool-title">📝 Description Generator</div>
<div class="tool-sub">Write SEO descriptions</div>
</div>
<div>→</div>
</div></div></div><script>

function start(){
let k=document.getElementById("keyword").value.trim();
if(!k)return alert("Enter keyword!");

result.innerHTML="⏳ Generating...";

setTimeout(()=>{
generate(k);
},1000);
}

function generate(k){

let patterns=[
"Top 10 "+k+" Tips That Actually Work",
"How to Master "+k+" in 7 Days",
k+" Secrets No One Talks About",
"Stop Doing These "+k+" Mistakes",
"Beginner Guide to "+k+" (2025)",
"How I Grew Fast Using "+k,
k+" Strategy That Works in 2025",
"Best "+k+" Hacks You Must Try",
"Why "+k+" is So Powerful?",
k+" Explained in Simple Way"
];

let shuffled = patterns.sort(()=>0.5 - Math.random()).slice(0,6);

let html='<div class="card"><div class="inner">';
shuffled.forEach(t=>{
html+=`
<div class="item" onclick="copy(this)">
<div class="text">${t}</div>
<div class="copy">Copy</div>
</div>`;
});
html+='</div></div>';

result.innerHTML=html;
}

function copy(el){
let text=el.innerText.replace("Copy","");
navigator.clipboard.writeText(text);

el.querySelector(".copy").innerText="✓";
setTimeout(()=>{
el.querySelector(".copy").innerText="Copy";
},1000);
}

/* 🔥 FIXED LINKS */
