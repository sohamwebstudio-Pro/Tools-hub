<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator</title><!-- Google Analytics --><script async src="https://www.googletagmanager.com/gtag/js?id=G-MZF0VV7PZG"></script><script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-MZF0VV7PZG');
</script><style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;font-family:Arial;background:#0f172a;color:white;text-align:center;}

h1{color:#38bdf8;margin-top:20px;}

.container{max-width:420px;margin:auto;padding:15px;}

input,select{
width:100%;padding:12px;margin-top:10px;
border:none;border-radius:10px;
background:#1e293b;color:white;
}

button{
width:100%;padding:12px;margin-top:15px;
border:none;border-radius:12px;
background:linear-gradient(90deg,#38bdf8,#22c55e);
color:black;font-weight:bold;cursor:pointer;
}

.qr-box{
margin-top:15px;
background:#1e293b;
padding:15px;
border-radius:12px;
display:none;
}

img{
width:100%;
max-width:200px;
margin:auto;
display:block;
}

.download{
margin-top:10px;
color:#22c55e;
cursor:pointer;
}
</style></head><body><h1>🔗 QR Code Generator</h1><div class="container"><input type="text" id="text" placeholder="Enter URL or text"><select id="size">
<option value="150">Small</option>
<option value="250" selected>Medium</option>
<option value="350">Large</option>
</select><button onclick="generate()">Generate QR</button>

<div class="qr-box" id="qrBox">
<img id="qrImg">
<div class="download" onclick="download()">Download QR</div>
</div></div><script>

function generate(){
let t=document.getElementById("text").value.trim();
if(!t)return alert("Enter text or URL!");

let s=document.getElementById("size").value;

let url=`https://api.qrserver.com/v1/create-qr-code/?size=${s}x${s}&data=${encodeURIComponent(t)}`;

qrImg.src=url;
qrBox.style.display="block";
}

function download(){
let link=document.createElement("a");
link.href=qrImg.src;
link.download="qr-code.png";
link.click();
}

</script></body>
</html>
