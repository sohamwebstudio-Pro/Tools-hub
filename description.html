<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Description Generator</title><!-- 🔥 Google Analytics --><script async src="https://www.googletagmanager.com/gtag/js?id=G-MZF0VV7PZG"></script><script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-MZF0VV7PZG');
</script><style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

h1{
  margin-top:20px;
  color:#38bdf8;
}

.container{
  max-width:420px;
  margin:auto;
  padding:15px;
}

input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#1e293b;
  color:white;
  margin-top:15px;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#38bdf8,#22c55e);
  color:black;
  font-weight:bold;
  cursor:pointer;
}

button:active{transform:scale(0.95);}

.card{
  margin-top:15px;
  border-radius:14px;
  padding:2px;
  background:linear-gradient(135deg,#38bdf8,#22c55e);
}

.inner{
  background:#1e293b;
  border-radius:12px;
  padding:12px;
  text-align:left;
  font-size:14px;
  line-height:1.5;
}

/* COPY BUTTON */
.copy{
  margin-top:10px;
  color:white;
  text-align:center;
  cursor:pointer;
  font-size:13px;
  background:linear-gradient(90deg,#38bdf8,#22c55e);
  padding:10px;
  border-radius:10px;
  font-weight:bold;
}

.copy:active{
  transform:scale(0.95);
}

/* TOOL CARDS */
.tool-card{
  background:linear-gradient(135deg,#1e293b,#0f172a);
  border:1px solid #334155;
  padding:18px;
  border-radius:14px;
  margin-top:12px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.tool-card:active{
  transform:scale(0.96);
  background:#334155;
}

.tool-title{
  font-size:14px;
}

.tool-sub{
  font-size:11px;
  color:#94a3b8;
}
</style></head><body><h1>📝 Description Generator</h1><div class="container"><input type="text" id="keyword" placeholder="Enter keyword"><button onclick="start()">Generate Description</button>

<div id="result"></div><!-- 🔥 LOOP TOOLS --><div onclick="goTitle()" class="tool-card">
<div>
<div class="tool-title">📺 Title Generator</div>
<div class="tool-sub">Create catchy titles</div>
</div>
<div>→</div>
</div><div onclick="goTag()" class="tool-card">
<div>
<div class="tool-title">🏷️ Hashtag Generator</div>
<div class="tool-sub">Generate viral tags</div>
</div>
<div>→</div>
</div></div><script>

function start(){
let k=document.getElementById("keyword").value.trim();
if(!k)return alert("Enter keyword!");

result.innerHTML="⏳ Generating...";

setTimeout(()=>{
generate(k);
},1000);
}

function generate(k){

let descriptions=[
`In this video, we dive deep into ${k} and share practical tips, strategies, and real insights to improve quickly.`,

`Want to master ${k}? This video covers everything from basics to advanced methods that actually work.`,

`${k} can be confusing, but here we explain it in a simple and practical way so you can apply it easily.`,

`If you want better results in ${k}, this video will guide you with proven strategies and smart techniques.`,

`This video reveals powerful ${k} tips, common mistakes, and how to grow faster with the right approach.`
];

let d = descriptions[Math.floor(Math.random()*descriptions.length)];

let html=`
<div class="card">
  <div class="inner">${d}</div>
  <div class="copy" onclick="copyText(this)">Copy Description</div>
</div>
`;

result.innerHTML=html;
}

function copyText(el){
let text = el.previousElementSibling.innerText;

navigator.clipboard.writeText(text).then(()=>{
  el.innerText="✓ Copied";
}).catch(()=>{
  el.innerText="Copied!";
});

setTimeout(()=>{
  el.innerText="Copy Description";
},1000);
}

/* 🔥 FIXED LINKS */
function goTitle(){
window.location.href="https://sohamwebstudio-pro.github.io/Tools-hub/title.html";
}

function goTag(){
window.location.href="https://sohamwebstudio-pro.github.io/Tools-hub/tag.html";
}

</script></body>
</html>
