<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Bio Generator</title><!-- Google Analytics --><script async src="https://www.googletagmanager.com/gtag/js?id=G-MZF0VV7PZG"></script><script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-MZF0VV7PZG');
</script><style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;font-family:Arial;background:#0f172a;color:white;text-align:center;}

h1{color:#38bdf8;margin-top:20px;}

.container{max-width:420px;margin:auto;padding:15px;}

input{
width:100%;padding:12px;border:none;border-radius:12px;
background:#1e293b;color:white;margin-top:15px;
}

button{
width:100%;padding:12px;margin-top:15px;border:none;
border-radius:12px;background:linear-gradient(90deg,#38bdf8,#22c55e);
color:black;font-weight:bold;cursor:pointer;
}

.loading{
margin-top:15px;font-size:14px;color:#94a3b8;display:none;
}

.card{
margin-top:15px;border-radius:14px;padding:2px;
background:linear-gradient(135deg,#38bdf8,#22c55e);
}

.inner{
background:#1e293b;border-radius:12px;overflow:hidden;
}

.section{
padding:10px;border-bottom:1px solid #334155;text-align:left;
}

.section-title{
font-size:12px;color:#94a3b8;margin-bottom:5px;
}

.item{
padding:10px 0;display:flex;justify-content:space-between;
font-size:14px;cursor:pointer;
}

.copy{color:#22c55e;font-size:12px;}

.copy-all{
margin-top:10px;text-align:center;font-size:13px;
color:#22c55e;cursor:pointer;
}
</style></head><body><h1>📱 Instagram Bio Generator</h1><div class="container"><input type="text" id="keyword" placeholder="Enter your niche (e.g. trader, gamer)"><button onclick="start()">Generate Bio</button>

<div class="loading" id="loading">⏳ Creating bios...</div><div id="result"></div></div><script>

function start(){
let k=keyword.value.trim();
if(!k)return alert("Enter your niche!");

loading.style.display="block";
result.innerHTML="";

setTimeout(()=>{
generate(k);
loading.style.display="none";
},1000);
}

function generate(k){

let cool=[
`${k} 🔥 | Living the dream`,
`${k} | Hustle daily 💸`,
`${k} | Mindset + Growth 🚀`,
`${k} lover ❤️ | Stay focused`,
`${k} life | No excuses ⚡`
];

let pro=[
`${k} Expert | Helping others grow`,
`${k} Specialist | Results matter`,
`${k} Mentor | Learn & earn`,
`${k} | Building success daily`,
`${k} | Turning ideas into money`
];

let attitude=[
`No risk no story 😎`,
`Dream big, work hard 💯`,
`Focus. Grind. Repeat.`,
`Silence + Work = Success`,
`Stay hungry 🔥`
];

function render(title,list){
let html=`<div class="section"><div class="section-title">${title}</div>`;
list.forEach(t=>{
html+=`
<div class="item" onclick="copy(this)">
<span>${t}</span>
<span class="copy">Copy</span>
</div>`;
});
html+=`</div>`;
return html;
}

let html='<div class="card"><div class="inner">';
html+=render("Cool Bios",cool);
html+=render("Professional Bios",pro);
html+=render("Attitude Lines",attitude);
html+=`<div class="copy-all" onclick="copyAll()">Copy All</div>`;
html+='</div></div>';

result.innerHTML=html;
}

function copy(el){
let text=el.innerText.replace("Copy","");
navigator.clipboard.writeText(text);

el.querySelector(".copy").innerText="✓";
setTimeout(()=>{
el.querySelector(".copy").innerText="Copy";
},1000);
}

function copyAll(){
let items=document.querySelectorAll(".item span:first-child");
let text="";
items.forEach(i=>text+=i.innerText+" | ");
navigator.clipboard.writeText(text);
}

</script></body>
</html>
